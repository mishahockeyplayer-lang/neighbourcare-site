<style>
  :root{
    --bg:#eef4fb;
    --bg-2:#dde9f6;
    --paper:#ffffff;
    --ink:#102338;
    --ink-soft:#3a4c61;
    --muted:#7a8a9c;
    --line:#d7e3f1;
    --line-soft:#e8f0f9;
    --accent:#2f73d8;       /* warm brass */
    --accent-deep:#1e57b0;
    --dark:#0c1b2e;
    --dark-2:#13273e;
    --success:#5b6b4f;
    --radius:18px;
    --radius-sm:12px;
    --shadow-sm:0 1px 2px rgba(16,35,56,.05), 0 4px 16px rgba(16,35,56,.05);
    --shadow:0 24px 60px -28px rgba(16,35,56,.28);
    --serif:"Fraunces", Georgia, serif;
    --sans:"Hanken Grotesk", system-ui, sans-serif;
    --maxw:1200px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.55;font-size:16px;
    background-image:radial-gradient(1200px 600px at 80% -10%, #e8f1fe 0%, rgba(232,241,254,0) 60%);
  }
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .serif{font-family:var(--serif)}
  h1,h2,h3{font-family:var(--serif);font-weight:500;line-height:1.05;letter-spacing:-.01em;margin:0}
  h1{font-size:clamp(2.6rem,6vw,4.6rem)}
  h2{font-size:clamp(1.9rem,3.6vw,3rem)}
  h3{font-size:1.15rem}
  p{margin:0}
  .eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-deep);font-weight:600}
  .lead{color:var(--ink-soft);font-size:clamp(1.02rem,1.6vw,1.18rem);max-width:54ch}
  .muted{color:var(--muted)}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:.5rem;border-radius:999px;padding:.85rem 1.5rem;
    font-weight:600;font-size:.94rem;cursor:pointer;border:1px solid transparent;transition:.25s ease;white-space:nowrap}
  .btn-primary{background:var(--dark);color:#eaf2fd}
  .btn-primary:hover{background:#000;transform:translateY(-1px)}
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--ink)}
  .btn-ghost:hover{background:var(--paper);border-color:var(--accent)}
  .btn-light{background:#eaf2fd;color:var(--ink)}
  .btn-block{width:100%;justify-content:center}

  /* header */
  header.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
    background:rgba(238,244,251,.82);border-bottom:1px solid var(--line-soft)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
  .brand{font-family:var(--serif);font-size:1.35rem;font-weight:600;letter-spacing:-.02em;display:flex;align-items:baseline;gap:.4rem}
  .brand sup{font-family:var(--sans);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-deep);font-weight:600;top:-.6em}
  .nav-links{display:flex;gap:2rem;align-items:center}
  .nav-links a{font-size:.92rem;color:var(--ink-soft);font-weight:500;position:relative;padding:.25rem 0}
  .nav-links a:hover,.nav-links a.active{color:var(--ink)}
  .nav-links a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1.5px;background:var(--accent)}
  .nav-cta{display:flex;gap:.6rem;align-items:center}
  .nav-cta .signin{font-size:.92rem;font-weight:500;color:var(--ink-soft)}
  .nav-cta .signin:hover{color:var(--ink)}
  .menu-toggle{display:none;background:none;border:1px solid var(--line);border-radius:10px;padding:.5rem .6rem;cursor:pointer}

  section{padding:clamp(64px,9vw,120px) 0}
  .section-head{max-width:62ch}
  .section-head h2{margin-top:.8rem}
  .section-head p{margin-top:1.1rem}

  /* hero */
  .hero{position:relative;min-height:92vh;display:flex;align-items:center;color:#f5f9ff;overflow:hidden;padding:0}
  .hero-bg{position:absolute;inset:0;z-index:0}
  .hero-bg img{width:100%;height:100%;object-fit:cover}
  .hero-bg::after{content:"";position:absolute;inset:0;
    background:linear-gradient(105deg, rgba(8,18,30,.88) 0%, rgba(8,18,30,.6) 42%, rgba(8,18,30,.15) 100%)}
  .hero .wrap{position:relative;z-index:2;width:100%;display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:center;padding-top:60px;padding-bottom:60px}
  .hero-badge{display:inline-flex;align-items:center;gap:.5rem;font-size:.78rem;letter-spacing:.06em;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);padding:.45rem .9rem;border-radius:999px;color:#dbe7f5}
  .hero-badge .dot{width:7px;height:7px;border-radius:50%;background:#7fb2f3;box-shadow:0 0 0 4px rgba(127,178,243,.25)}
  .hero h1{color:#eaf3fe;margin-top:1.4rem}
  .hero h1 em{font-style:italic;color:#a9ccf6}
  .hero p{margin-top:1.4rem;color:#c8d7e8;max-width:46ch;font-size:1.08rem}
  .hero-cta{margin-top:2rem;display:flex;gap:.8rem;flex-wrap:wrap}
  .hero-feats{margin-top:2rem;display:flex;gap:1.4rem;flex-wrap:wrap;font-size:.86rem;color:#b9cadd}
  .hero-feats span{display:flex;align-items:center;gap:.45rem}
  .check{color:#a9ccf6}

  /* live preview card */
  .preview-card{background:rgba(255,255,255,.97);color:var(--ink);border-radius:var(--radius);
    padding:22px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.5)}
  .preview-top{display:flex;justify-content:space-between;align-items:center;font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .preview-pill{background:var(--bg-2);border-radius:999px;padding:.2rem .6rem;font-size:.66rem;color:var(--accent-deep);letter-spacing:.1em}
  .preview-date{margin-top:14px;font-weight:600}
  .preview-sub{color:var(--muted);font-size:.9rem;margin-top:2px}
  .preview-total{margin-top:16px;padding-top:16px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline}
  .preview-total .amt{font-family:var(--serif);font-size:2rem}
  .preview-note{margin-top:10px;font-size:.78rem;color:var(--muted)}

  /* marquee */
  .marquee{background:var(--dark);color:#b9cadd;overflow:hidden;padding:16px 0;border-block:1px solid #1a3047}
  .marquee-track{display:flex;gap:3rem;width:max-content;animation:scroll 26s linear infinite;font-size:.82rem;letter-spacing:.16em;text-transform:uppercase}
  .marquee-track span{display:flex;align-items:center;gap:3rem}
  .marquee-track span::after{content:"·";color:var(--accent)}
  @keyframes scroll{to{transform:translateX(-50%)}}

  /* feature grid */
  .grid{display:grid;gap:20px}
  .features{grid-template-columns:repeat(3,1fr);margin-top:48px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm);transition:.3s}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .card .ico{width:42px;height:42px;border-radius:12px;background:var(--bg-2);display:grid;place-items:center;color:var(--accent-deep);margin-bottom:18px}
  .card h3{margin-bottom:8px}
  .card p{color:var(--ink-soft);font-size:.94rem}

  /* atmosphere */
  .atmo{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
  .atmo-list{margin-top:28px;display:grid;gap:2px}
  .atmo-list .row{display:flex;gap:16px;align-items:baseline;padding:16px 0;border-top:1px solid var(--line)}
  .atmo-list .num{font-family:var(--serif);color:var(--accent);font-size:.95rem;min-width:24px}
  .collage{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:14px}
  .collage figure{margin:0;position:relative;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
  .collage figure img{width:100%;height:100%;object-fit:cover}
  .collage .tall{grid-row:span 2}
  .collage figcaption{position:absolute;left:14px;bottom:12px;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .collage figcaption .k{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;opacity:.85}
  .collage figcaption .v{font-family:var(--serif);font-size:1.05rem}

  /* standard / stats */
  .standard{background:var(--dark);color:#d6e3f2;border-radius:28px;padding:clamp(40px,6vw,72px);position:relative;overflow:hidden}
  .standard::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 300px at 90% 0%, rgba(47,115,216,.32),transparent 60%)}
  .standard .inner{position:relative;display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center}
  .standard h2{color:#eef5ff}
  .standard p{color:#b9cadd;margin-top:1.2rem}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:28px}
  .stat .n{font-family:var(--serif);font-size:2.6rem;color:#a9ccf6;line-height:1}
  .stat .l{color:#93a7bd;font-size:.86rem;margin-top:6px}
  .standard .btn{margin-top:8px}

  /* pricing builder */
  .builder{display:grid;grid-template-columns:1.55fr .95fr;gap:32px;margin-top:48px;align-items:start}
  .builder-step{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:26px;margin-bottom:18px}
  .builder-step .stepnum{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .builder-step .stepnum b{width:28px;height:28px;border-radius:50%;background:var(--dark);color:#eaf2fd;display:grid;place-items:center;font-size:.85rem;font-family:var(--sans)}
  .builder-step .stepnum h3{font-size:1.1rem}
  .basefee{display:flex;justify-content:space-between;align-items:center;font-weight:600}
  .basefee .price{font-family:var(--serif);font-size:1.3rem}
  .types{display:grid;gap:12px}
  .type-opt{display:flex;justify-content:space-between;align-items:center;gap:14px;border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:16px;cursor:pointer;transition:.2s;background:#fff}
  .type-opt:hover{border-color:var(--accent)}
  .type-opt.sel{border-color:var(--accent);background:#eaf3fe;box-shadow:inset 0 0 0 1px var(--accent)}
  .type-opt .t-name{font-weight:600}
  .type-opt .t-desc{font-size:.85rem;color:var(--muted);margin-top:2px}
  .type-opt .t-price{font-weight:600;color:var(--accent-deep);white-space:nowrap}
  .rooms{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .room{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;background:#fff}
  .room .r-name{font-weight:600;font-size:.92rem}
  .room .r-meta{font-size:.78rem;color:var(--muted)}
  .stepper{display:flex;align-items:center;gap:10px}
  .stepper button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--bg);font-size:1.1rem;cursor:pointer;color:var(--ink);line-height:1;transition:.15s}
  .stepper button:hover{border-color:var(--accent);color:var(--accent-deep)}
  .stepper .val{min-width:18px;text-align:center;font-weight:600}
  .upgrades{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .upg{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;cursor:pointer;background:#fff;transition:.2s}
  .upg:hover{border-color:var(--accent)}
  .upg.sel{border-color:var(--accent);background:#eaf3fe}
  .upg .u-name{font-weight:600;font-size:.9rem}
  .upg .u-price{color:var(--accent-deep);font-weight:600;font-size:.9rem}
  .upg .box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);display:grid;place-items:center;flex:none}
  .upg.sel .box{background:var(--accent);border-color:var(--accent);color:#fff}

  /* summary */
  .summary{position:sticky;top:92px;background:var(--dark);color:#d6e3f2;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
  .summary .s-label{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#93a7bd}
  .summary .s-total{font-family:var(--serif);font-size:2.8rem;color:#eef5ff;line-height:1;margin-top:6px}
  .summary .s-mins{color:#93a7bd;font-size:.86rem;margin-top:4px}
  .summary .s-lines{margin-top:20px;border-top:1px solid #20374f;padding-top:16px;display:grid;gap:11px}
  .summary .s-row{display:flex;justify-content:space-between;font-size:.9rem;color:#b9cadd}
  .summary .s-row.sub{border-top:1px solid #20374f;padding-top:12px;color:#eef5ff;font-weight:600}
  .summary .s-row .v{font-weight:600;color:#e6eefb}
  .summary .btn{margin-top:20px}
  .summary .s-note{font-size:.74rem;color:#8497ab;text-align:center;margin-top:12px}

  /* reviews */
  .review-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px}
  .stars{color:var(--accent);font-size:1.1rem}
  .quote{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:40px;margin-top:36px;box-shadow:var(--shadow-sm)}
  .quote q{font-family:var(--serif);font-size:clamp(1.3rem,2.4vw,1.9rem);font-style:italic;display:block;line-height:1.35}
  .quote .who{margin-top:24px;font-weight:600}
  .quote .where{color:var(--muted);font-size:.9rem}

  /* faq / accordion */
  .acc{margin-top:40px;border-top:1px solid var(--line)}
  .acc-item{border-bottom:1px solid var(--line)}
  .acc-q{width:100%;text-align:left;background:none;border:none;padding:22px 0;display:flex;justify-content:space-between;
    align-items:center;gap:20px;cursor:pointer;font-family:var(--serif);font-size:1.12rem;color:var(--ink)}
  .acc-q .pm{font-family:var(--sans);font-size:1.4rem;color:var(--accent);transition:.25s}
  .acc-item.open .pm{transform:rotate(45deg)}
  .acc-a{max-height:0;overflow:hidden;transition:max-height .3s ease;color:var(--ink-soft)}
  .acc-a div{padding:0 0 22px;max-width:64ch}

  /* CTA band */
  .cta-band{text-align:center;max-width:60ch;margin:0 auto}
  .cta-band .btns{margin-top:28px;display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}

  /* footer */
  footer{background:var(--dark);color:#93a7bd;padding:56px 0 40px}
  .foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
  .foot .brand{color:#eaf2fd}
  .foot-links{display:flex;gap:24px;flex-wrap:wrap;font-size:.9rem}
  .foot-links a:hover{color:#eaf2fd}
  .foot-copy{margin-top:30px;padding-top:24px;border-top:1px solid #1a3047;font-size:.82rem}

  /* generic page header */
  .page-head{padding:clamp(56px,8vw,96px) 0 0}
  .page-head .eyebrow{margin-bottom:1rem}
  .page-head h1{max-width:18ch}
  .page-head .lead{margin-top:1.4rem}

  /* plans / lists */
  .three{grid-template-columns:repeat(3,1fr)}
  .incl{margin-top:24px;display:grid;gap:12px}
  .incl li{list-style:none;display:flex;gap:12px;align-items:flex-start;color:var(--ink-soft)}
  .incl li::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:9px;flex:none}
  ul{padding:0;margin:0}

  .tier{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:32px}
  .tier .top{display:flex;justify-content:space-between;align-items:baseline;gap:16px}
  .tier .price{font-family:var(--serif);font-size:1.6rem;color:var(--accent-deep)}
  .tier .sub{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .tier h3{margin-top:6px;font-size:1.5rem}
  .tier .label{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:22px}

  .split{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}

  /* about */
  .founder{display:grid;grid-template-columns:.85fr 1.15fr;gap:48px;align-items:center}
  .founder img{border-radius:var(--radius);box-shadow:var(--shadow);width:100%;object-fit:cover}
  .pullquote{font-family:var(--serif);font-style:italic;font-size:clamp(1.3rem,2.4vw,1.8rem);
    border-left:3px solid var(--accent);padding-left:24px;margin:32px 0;color:var(--ink)}

  /* forms */
  .field{display:block;margin-bottom:16px}
  .field span{display:block;font-size:.82rem;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
  .field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:.8rem 1rem;font-family:var(--sans);font-size:16px;background:#fff;color:var(--ink)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,115,216,.16)}
  .field-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  .contact-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:48px}
  .contact-box{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:28px;margin-bottom:16px}
  .contact-box .k{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .contact-box .v{font-family:var(--serif);font-size:1.3rem;margin-top:6px}

  /* booking progress */
  .progress{display:flex;gap:8px;margin:28px 0 36px;flex-wrap:wrap}
  .pstep{flex:1;min-width:130px;border-top:2px solid var(--line);padding-top:12px}
  .pstep.done,.pstep.cur{border-color:var(--accent)}
  .pstep .pi{display:flex;align-items:center;gap:10px}
  .pstep .pi b{width:24px;height:24px;border-radius:50%;background:var(--bg-2);color:var(--muted);
    display:grid;place-items:center;font-size:.78rem;font-family:var(--sans);flex:none}
  .pstep.done .pi b,.pstep.cur .pi b{background:var(--dark);color:#eaf2fd}
  .pstep .pl{font-size:.9rem;font-weight:600;color:var(--ink-soft)}
  .pstep.cur .pl{color:var(--ink)}

  .timegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:8px}
  .slot{border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;background:#fff;font-size:.9rem;transition:.2s}
  .slot:hover{border-color:var(--accent)}
  .slot.sel{border-color:var(--accent);background:#eaf3fe;font-weight:600}
  .daygrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:22px}

  .confirm-line{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);font-size:.95rem}
  .confirm-line .k{color:var(--muted)}

  /* portal */
  .portal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:8px}
  .portal-feat{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
  .portal-feat h3{font-size:1.05rem;margin-bottom:6px}
  .portal-feat p{color:var(--ink-soft);font-size:.9rem}
  .auth-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-sm)}

  /* policies */

<script>
/* ---------- assets (from the live site) ---------- */
const IMG = {
  hero:"https://neighbour.care/assets/hero-condo-CGnmyl_f.jpg",
  bathroom:"https://neighbour.care/assets/section-bathroom-D5G8Fjc_.jpg",
  bedroom:"https://neighbour.care/assets/section-bedroom-B_aVtK_Q.jpg",
  kitchen:"https://neighbour.care/assets/section-kitchen-dark-DfnCQH7a.jpg",
  founder:"https://neighbour.care/assets/owen-feltham-muiCQOBu.png"
};

/* ---------- pricing data ---------- */
const BASE_FEE = 50;
const BASE_MINUTES = 30;
const HST_RATE = 0.13;

const TYPES = [
  {id:"regular", name:"Regular / Maintenance", price:0,   custom:false, desc:"Recurring upkeep — weekly, biweekly, or monthly.", tag:"Included"},
  {id:"deep",    name:"Deep Clean",            price:130, custom:false, desc:"Top-to-bottom reset for built-up buildup.",     tag:"+$130"},
  {id:"move",    name:"Move-In / Move-Out",    price:160, custom:false, desc:"Empty-home detail before keys change hands.",  tag:"+$160"},
  {id:"extreme", name:"Extreme Deep Clean",    price:0,   custom:true,  desc:"Custom quote after on-site assessment.",       tag:"Custom"}
];

const ROOMS = [
  {id:"bedrooms",   name:"Bedrooms",          price:20, mins:20, def:2},
  {id:"living",     name:"Living Rooms",      price:20, mins:20, def:1},
  {id:"dining",     name:"Dining Rooms",      price:20, mins:20, def:0},
  {id:"offices",    name:"Offices",           price:20, mins:20, def:0},
  {id:"dens",       name:"Dens",              price:20, mins:20, def:0},
  {id:"kitchens",   name:"Kitchens",          price:30, mins:30, def:1},
  {id:"fullbath",   name:"Full Bathrooms",    price:30, mins:30, def:1},
  {id:"basement",   name:"Main Basement Area",price:30, mins:30, def:0},
  {id:"halfbath",   name:"Half Bathrooms",    price:15, mins:15, def:0},
  {id:"laundry",    name:"Laundry Rooms",     price:15, mins:15, def:0},
  {id:"storage",    name:"Storage Areas",     price:15, mins:15, def:0},
  {id:"stairs",     name:"Staircases",        price:10, mins:10, def:0},
  {id:"entryways",  name:"Entryways",         price:10, mins:10, def:0},
  {id:"closets",    name:"Walk-In Closets",   price:10, mins:10, def:0}
];

const UPGRADES = [
  {id:"cabinets",   name:"Inside Kitchen Cabinets", price:45},
  {id:"oven",       name:"Inside Oven",             price:40},
  {id:"fridge",     name:"Inside Fridge",           price:40},
  {id:"dishwasher", name:"Inside Dishwasher",       price:40},
  {id:"windows",    name:"Interior Windows (each)", price:10}
];

/* ---------- shared state ---------- */
const state = {
  type:"regular",
  rooms:Object.fromEntries(ROOMS.map(r=>[r.id, r.def])),
  upgrades:Object.fromEntries(UPGRADES.map(u=>[u.id,false])),
  bookingStep:1,
  slotDay:null,
  slotTime:null,
  details:{name:"",phone:"",email:"",address:"",emailOptIn:false,smsOptIn:false}
};

const money = n => "$"+n.toFixed(2);

/* ---------- minimum order rule ---------- */
const MIN_SERVICES = 100;   // min in rooms/services/upgrades, before the service fee
const MIN_ORDER = 150;      // = $100 services + $50 mandatory service fee
function serviceTotal(c){ return c.typeAdd + c.roomsTotal + c.upgradesTotal; }
function meetsMin(c){ return c.type.custom || serviceTotal(c) >= MIN_SERVICES; }
const MIN_NOTE = "Minimum order value: $150, including a mandatory $50 service fee.";
const MSG_LIVE = "Minimum service selection is $100 before the $50 service fee. Total minimum order value is $150.";
const MSG_SUBMIT = "Please select at least $100 in cleaning services or upgrades. A $50 service fee is added to every order, making the minimum total $150.";

/* =========================================================================
   INTEGRATIONS — fill these two blocks in to go live.
   Until then the site runs in safe "demo mode": buttons work and explain
   what to connect, but nothing is sent.
   ========================================================================= */

/* --- EMAIL (Web3Forms) ---------------------------------------------------
   1. Go to https://web3forms.com, enter the inbox that should RECEIVE the
      mail (e.g. neighbour@care.com) and verify it.
   2. Paste the access key you get below. That's it — forms email that inbox. */
const FORMS_KEY = "6fe31219-8eb8-4fc3-9671-7d7f9d382978";   // Web3Forms public access key
const FORM_TO   = "mpqvsa@gmail.com";          // inbox that receives submissions

/* --- AUTH (Supabase: Google, Apple, Facebook, email) ---------------------
   1. Create a free project at https://supabase.com → Project Settings → API.
   2. Paste the Project URL and the anon public key below.
   3. In Supabase → Authentication → Providers, enable Email + Google/Apple/
      Facebook (each provider needs its own client ID/secret from that
      provider's console — Supabase shows the exact redirect URL to use).
   4. Add your live site URL under Authentication → URL Configuration. */
const AUTH = { url:"YOUR_SUPABASE_PROJECT_URL", anon:"YOUR_SUPABASE_ANON_KEY" };

const FORMS_READY = FORMS_KEY && !FORMS_KEY.startsWith("YOUR_");
const AUTH_READY  = AUTH.url && AUTH.anon && !AUTH.url.startsWith("YOUR_");

function loadScript(src){
  return new Promise((res,rej)=>{ const s=document.createElement("script"); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
}
function showFeedback(id,text,kind){
  const m=document.getElementById(id); if(!m) return;
  m.style.display="block"; m.className="auth-msg "+(kind||"info"); m.textContent=text;
}

/* ---- email sending ---- */
async function sendForm(payload, feedbackId){
  if(!FORMS_READY){
    if(feedbackId) showFeedback(feedbackId, "This form is fully wired up. Add your free Web3Forms key to start receiving emails at "+FORM_TO+".", "info");
    return false;
  }
  try{
    const res = await fetch("https://api.web3forms.com/submit",{
      method:"POST",
      headers:{"Content-Type":"application/json", Accept:"application/json"},
      body: JSON.stringify({ access_key:FORMS_KEY, from_name:"NeighbourCare Website", ...payload })
    });
    const j = await res.json();
    if(j.success){ if(feedbackId) showFeedback(feedbackId,"Sent — we'll reply shortly. Thank you!","ok"); return true; }
    if(feedbackId) showFeedback(feedbackId,"Couldn't send right now. Please call 289-301-0703.","error");
    return false;
  }catch(e){
    if(feedbackId) showFeedback(feedbackId,"Network error. Please call us at 289-301-0703.","error");
    return false;
  }
}

/* ---- Supabase auth ---- */
let sb = null;
async function ensureSupabase(){
  if(sb) return sb;
  if(!AUTH_READY) return null;
  if(!window.supabase) await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2");
  sb = window.supabase.createClient(AUTH.url, AUTH.anon);
  return sb;
}
async function oauthSignIn(provider){
  if(!AUTH_READY){ showFeedback("authMsg","Sign in with "+provider[0].toUpperCase()+provider.slice(1)+" is built and ready — connect your Supabase project (see setup notes in the file) to switch it on.","info"); return; }
  const c = await ensureSupabase();
  if(!c){ showFeedback("authMsg","Auth isn't configured yet.","error"); return; }
  await c.auth.signInWithOAuth({ provider, options:{ redirectTo: location.origin + location.pathname + "#/portal" } });
}
async function emailAuth(mode){
  if(!AUTH_READY){ showFeedback("authMsg","Email accounts are built and ready — connect Supabase to switch them on.","info"); return; }
  const email=(document.getElementById("authEmail")||{}).value||"";
  const pass =(document.getElementById("authPass")||{}).value||"";
  if(!email||!pass){ showFeedback("authMsg","Enter your email and password.","error"); return; }
  const c = await ensureSupabase();
  const { error } = mode==="signup"
    ? await c.auth.signUp({ email, password:pass, options:{ data:{
        phone:(document.getElementById("authPhone")||{}).value||"",
        marketing_email: !!(document.getElementById("authEmailOpt")||{}).checked,
        marketing_sms: !!(document.getElementById("authSmsOpt")||{}).checked
      } } })
    : await c.auth.signInWithPassword({ email, password:pass });
  if(error){ showFeedback("authMsg", error.message, "error"); }
  else if(mode==="signup"){ showFeedback("authMsg","Account created — check your email to confirm.","ok"); }
  else { refreshAuthState(); }
}
async function magicLink(){
  if(!AUTH_READY){ showFeedback("authMsg","Magic links are built and ready — connect Supabase to switch them on.","info"); return; }
  const email=(document.getElementById("authEmail")||{}).value||"";
  if(!email){ showFeedback("authMsg","Enter your email first.","error"); return; }
  const c = await ensureSupabase();
  const { error } = await c.auth.signInWithOtp({ email });
  showFeedback("authMsg", error? error.message : "Magic link sent — check your inbox.", error?"error":"ok");
}
async function refreshAuthState(){
  if(!AUTH_READY) return;
  const c = await ensureSupabase(); if(!c) return;
  const { data } = await c.auth.getUser();
  const so=document.getElementById("authSignedOut"), si=document.getElementById("authSignedIn");
  if(!so||!si) return;
  if(data && data.user){
    so.style.display="none"; si.style.display="block";
    const n=document.getElementById("authName"); if(n) n.textContent = data.user.email? (", "+data.user.email) : "";
  } else { so.style.display="block"; si.style.display="none"; }
}
async function signOutUser(){
  const c = await ensureSupabase(); if(c) await c.auth.signOut();
  const so=document.getElementById("authSignedOut"), si=document.getElementById("authSignedIn");
  if(so&&si){ so.style.display="block"; si.style.display="none"; }
}
function captureDetails(){
  const g=id=>(document.getElementById(id)||{}).value||"";
  const ck=id=>!!(document.getElementById(id)||{}).checked;
  state.details={ name:g("bk-name"), phone:g("bk-phone"), email:g("bk-email"), address:g("bk-address"),
                  emailOptIn:ck("bk-emailopt"), smsOptIn:ck("bk-smsopt") };
}

function compute(){
  const type = TYPES.find(t=>t.id===state.type);
  const typeAdd = type.price;
  let roomsTotal=0, mins=BASE_MINUTES;
  ROOMS.forEach(r=>{ const q=state.rooms[r.id]||0; roomsTotal+=q*r.price; mins+=q*r.mins; });
  let upgradesTotal=0;
  UPGRADES.forEach(u=>{ if(state.upgrades[u.id]) upgradesTotal+=u.price; });
  const subtotal = BASE_FEE + typeAdd + roomsTotal + upgradesTotal;
  const hst = subtotal*HST_RATE;
  const total = subtotal+hst;
  return {type,typeAdd,roomsTotal,upgradesTotal,subtotal,hst,total,mins};
}

/* ---------- reusable fragments ---------- */
function summaryHTML(){
  const c = compute();
  const typeVal = c.type.custom ? "Custom" : (c.typeAdd===0 ? "Included" : money(c.typeAdd));
  return `
    <div class="s-label">Live total</div>
    <div class="s-total" data-bind="total">${c.type.custom?"Custom":money(c.total)}</div>
    <div class="s-mins" data-bind="mins">~${c.mins} min on-site</div>
    <div class="s-lines">
      <div class="s-row"><span>Base service fee</span><span class="v">${money(BASE_FEE)}</span></div>
      <div class="s-row"><span data-bind="typename">${c.type.name}</span><span class="v" data-bind="typeval">${typeVal}</span></div>
      <div class="s-row"><span>Rooms</span><span class="v" data-bind="rooms">${money(c.roomsTotal)}</span></div>
      <div class="s-row"><span>Upgrades</span><span class="v" data-bind="upg">${money(c.upgradesTotal)}</span></div>
      <div class="s-row sub"><span>Subtotal</span><span class="v" data-bind="sub">${money(c.subtotal)}</span></div>
      <div class="s-row"><span>HST (13%)</span><span class="v" data-bind="hst">${money(c.hst)}</span></div>
    </div>
    <div class="min-warn" data-bind="minwarn" style="display:none"></div>
    <div class="min-note">${MIN_NOTE}</div>`;
}

function builderHTML(){
  return `
  <div>
    <div class="builder-step">
      <div class="stepnum"><b>1</b><h3>Base service fee</h3></div>
      <div class="basefee"><span class="muted">Covers travel, supplies, and team coordination.</span><span class="price">${money(BASE_FEE)}</span></div>
    </div>

    <div class="builder-step">
      <div class="stepnum"><b>2</b><h3>Choose one cleaning type</h3></div>
      <div class="types">
        ${TYPES.map(t=>`
          <div class="type-opt ${state.type===t.id?'sel':''}" data-action="type" data-id="${t.id}">
            <div><div class="t-name">${t.name}</div><div class="t-desc">${t.desc}</div></div>
            <div class="t-price">${t.tag}</div>
          </div>`).join("")}
      </div>
    </div>

    <div class="builder-step">
      <div class="stepnum"><b>3</b><h3>Add rooms</h3></div>
      <div class="rooms">
        ${ROOMS.map(r=>`
          <div class="room">
            <div><div class="r-name">${r.name}</div><div class="r-meta">$${r.price} · ~${r.mins} min</div></div>
            <div class="stepper">
              <button type="button" data-action="room-" data-id="${r.id}" aria-label="decrease">−</button>
              <span class="val" data-room="${r.id}">${state.rooms[r.id]}</span>
              <button type="button" data-action="room+" data-id="${r.id}" aria-label="increase">+</button>
            </div>
          </div>`).join("")}
      </div>
    </div>

    <div class="builder-step">
      <div class="stepnum"><b>4</b><h3>Optional upgrades</h3></div>
      <div class="upgrades">
        ${UPGRADES.map(u=>`
          <div class="upg ${state.upgrades[u.id]?'sel':''}" data-action="upg" data-id="${u.id}">
            <div class="box">✓</div>
            <div class="u-name">${u.name}</div>
            <div class="u-price">+$${u.price}</div>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}

/* refresh only the dynamic numbers + selection styling (no full re-render) */
function refreshBuilder(){
  const c = compute();
  document.querySelectorAll('[data-bind="total"]').forEach(e=>e.textContent=c.type.custom?"Custom":money(c.total));
  document.querySelectorAll('[data-bind="mins"]').forEach(e=>e.textContent=`~${c.mins} min on-site`);
  document.querySelectorAll('[data-bind="rooms"]').forEach(e=>e.textContent=money(c.roomsTotal));
  document.querySelectorAll('[data-bind="upg"]').forEach(e=>e.textContent=money(c.upgradesTotal));
  document.querySelectorAll('[data-bind="sub"]').forEach(e=>e.textContent=money(c.subtotal));
  document.querySelectorAll('[data-bind="hst"]').forEach(e=>e.textContent=money(c.hst));
  document.querySelectorAll('[data-bind="typeval"]').forEach(e=>{
    e.textContent = c.type.custom?"Custom":(c.typeAdd===0?"Included":money(c.typeAdd));
  });
  document.querySelectorAll('[data-bind="typename"]').forEach(e=>e.textContent=c.type.name);
  ROOMS.forEach(r=>{ const el=document.querySelector(`[data-room="${r.id}"]`); if(el) el.textContent=state.rooms[r.id]; });
  updateMinUI(false);
}

/* show/hide the minimum-order warning and gate the continue buttons */
function updateMinUI(attempt){
  const c = compute();
  const ok = meetsMin(c);
  const need = Math.max(0, MIN_SERVICES - serviceTotal(c));
  document.querySelectorAll('[data-bind="minwarn"]').forEach(w=>{
    if(ok){ w.style.display="none"; w.classList.remove("error"); return; }
    w.style.display="block";
    if(attempt){
      w.classList.add("error");
      w.innerHTML = MSG_SUBMIT;
    } else {
      w.classList.remove("error");
      w.innerHTML = MSG_LIVE + (need>0 ? ` <b>Add ${money(need)} more in services to continue.</b>` : "");
    }
  });
  document.querySelectorAll('[data-min-gate]').forEach(b=>b.classList.toggle("is-muted", !ok));
  return ok;
}
function scrollToWarn(){
  const w = [...document.querySelectorAll('[data-bind="minwarn"]')].find(e=>e.offsetParent!==null);
  if(w) w.scrollIntoView({behavior:"smooth", block:"center"});
}

/* ---------- booking flow ---------- */
const STEP_LABELS=["Your details","Build your plan","Pick a time","Confirm"];
function bookingProgress(){
  return `<div class="progress">${STEP_LABELS.map((l,i)=>{
    const n=i+1; const cls = n<state.bookingStep?"done":(n===state.bookingStep?"cur":"");
    return `<div class="pstep ${cls}"><div class="pi"><b>${n}</b></div><div class="pl">${l}</div></div>`;
  }).join("")}</div>`;
}
function bookingDays(){
  const days=[]; const d=new Date(); const fmt={weekday:"short",month:"short",day:"numeric"};
  for(let i=1;i<=6;i++){const x=new Date(d); x.setDate(d.getDate()+i); days.push(x.toLocaleDateString("en-US",fmt));}
  return days;
}
const TIMES=["8:00 AM","9:00 AM","10:30 AM","12:00 PM","1:30 PM","3:00 PM"];

function bookingBody(){
  if(state.bookingStep===1){
    return `<div class="builder-step" style="margin-bottom:0">
      <h2 style="font-size:1.9rem">Tell us about you.</h2>
      <p class="muted" style="margin:8px 0 22px">We'll use this to confirm your booking and send your receipt. Nothing else.</p>
      <div class="field"><span>Full name</span><input id="bk-name" type="text" placeholder="First and last name" value="${state.details.name||""}"></div>
      <div class="field-2">
        <div class="field"><span>Phone number</span><input id="bk-phone" type="tel" placeholder="(416) 555-0000" value="${state.details.phone||""}"></div>
        <div class="field"><span>Email</span><input id="bk-email" type="email" placeholder="you@email.com" value="${state.details.email||""}"></div>
      </div>
      <div class="field"><span>Address</span><input id="bk-address" type="text" placeholder="Street, unit, city" value="${state.details.address||""}"></div>
      <label class="consent"><input type="checkbox" id="bk-emailopt" ${state.details.emailOptIn?"checked":""}><span>Email me cleaning reminders, seasonal offers and updates.</span></label>
      <label class="consent"><input type="checkbox" id="bk-smsopt" ${state.details.smsOptIn?"checked":""}><span>Text me appointment reminders and occasional offers by SMS. Message &amp; data rates may apply; reply STOP to unsubscribe anytime.</span></label>
      <p class="consent-note">Optional. We only send what you opt into, and you can unsubscribe at any time. We never sell your information.</p>
    </div>`;
  }
  if(state.bookingStep===2){
    return `<h2 style="font-size:1.9rem;margin-bottom:6px">Build your plan.</h2>
      <p class="muted" style="margin-bottom:14px">Pick your cleaning type and the exact rooms you need. The total updates live.</p>
      <span class="home-min-note" style="margin-bottom:18px">◆ <b>Minimum order value: $150</b> — including a mandatory $50 service fee.</span>
      ${builderHTML()}`;
  }
  if(state.bookingStep===3){
    const days=bookingDays();
    return `<h2 style="font-size:1.9rem;margin-bottom:6px">Pick a time.</h2>
      <p class="muted" style="margin-bottom:22px">Choose the day and arrival window that works for you.</p>
      <div class="builder-step">
        <div class="label" style="font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Select a day</div>
        <div class="daygrid">${days.map(d=>`<div class="slot ${state.slotDay===d?'sel':''}" data-action="day" data-id="${d}">${d}</div>`).join("")}</div>
        <div class="label" style="font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Arrival window</div>
        <div class="timegrid">${TIMES.map(t=>`<div class="slot ${state.slotTime===t?'sel':''}" data-action="time" data-id="${t}">${t}</div>`).join("")}</div>
      </div>`;
  }
  // step 4 confirm
  const c=compute();
  const roomLines=ROOMS.filter(r=>state.rooms[r.id]>0).map(r=>`${state.rooms[r.id]}× ${r.name}`).join(", ")||"None";
  const upgLines=UPGRADES.filter(u=>state.upgrades[u.id]).map(u=>u.name).join(", ")||"None";
  return `<h2 style="font-size:1.9rem;margin-bottom:6px">Confirm your booking.</h2>
    <p class="muted" style="margin-bottom:22px">Review everything below. Your card won't be charged until the visit is completed.</p>
    <div class="builder-step">
      <div class="confirm-line"><span class="k">Cleaning type</span><span>${c.type.name}</span></div>
      <div class="confirm-line"><span class="k">Date & time</span><span>${state.slotDay||"—"} · ${state.slotTime||"—"}</span></div>
      <div class="confirm-line"><span class="k">Rooms</span><span style="max-width:60%;text-align:right">${roomLines}</span></div>
      <div class="confirm-line"><span class="k">Upgrades</span><span style="max-width:60%;text-align:right">${upgLines}</span></div>
      <div class="confirm-line"><span class="k">Estimated time</span><span>~${c.mins} min on-site</span></div>
      <div class="confirm-line" style="border:none;font-weight:600"><span class="k" style="color:var(--ink)">Total (incl. HST)</span><span>${c.type.custom?"Custom quote":money(c.total)}</span></div>
    </div>
    <button type="button" class="btn btn-primary btn-block" data-action="confirm-booking">Confirm booking</button>`;
}

  const c = compute();
  return `<div class="thankyou reveal">
    <div class="ty-check">✓</div>
    <h1>Thank you — your request is in.</h1>
    <p class="lead">We've received your booking details${state.slotDay?` for <b>${state.slotDay}${state.slotTime?` · ${state.slotTime}`:""}</b>`:""}. A NeighbourCare coordinator will confirm your visit shortly. Your card won't be charged until the visit is completed.</p>
    <p class="muted" style="margin-top:14px">Estimated total: <b style="color:var(--ink)">${c.type.custom?"Custom quote":money(c.total)}</b> · incl. HST</p>
    <div class="ty-btns">
      <a href="tel:+12893010703" class="btn btn-primary">☎ Call Now · 289-301-0703</a>
      <a href="#/" class="btn btn-ghost">Back to home</a>
    </div>
    <p class="muted" style="margin-top:20px;font-size:.85rem">Prefer to talk it through? Call us at <a href="tel:+12893010703" style="color:var(--accent-deep);font-weight:600">289-301-0703</a>.</p>
  </div>`;
}

function pageBooking(){
  if(state.bookingStep===5){
    return `<section class="wrap" style="padding-top:48px;min-height:60vh">${bookingThankYou()}</section>`;
  }
  return `
  <section class="wrap" style="padding-top:36px">
    <a href="#/" class="muted" style="font-size:.9rem">← Back to home</a>
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-top:18px">
      <span class="eyebrow">Step ${state.bookingStep} of 4</span>
    </div>
    ${bookingProgress()}
    <div class="builder">
      <div id="bookingBody">${bookingBody()}
        <div style="display:flex;justify-content:space-between;margin-top:24px">
          <button type="button" class="btn btn-ghost" data-action="bk-back" ${state.bookingStep===1?'style="visibility:hidden"':''}>← Back</button>
          ${state.bookingStep<4?`<button type="button" class="btn btn-primary" data-action="bk-next" ${state.bookingStep===2?'data-min-gate':''}>Continue</button>`:''}
        </div>
      </div>
      <aside class="summary">
        ${summaryHTML()}
        <div class="s-note">Card not charged until visit is completed.</div>
      </aside>
    </div>

/* ---------- router ---------- */
const ROUTES={
  "/":pageHome, "/regular-cleaning":pageRegular, "/deep-cleaning":pageDeep,
  "/about":pageAbout, "/contact":pageContact, "/booking":pageBooking,
  "/portal":pagePortal, "/privacy":pagePrivacy, "/policies":pagePolicies
};

function render(){
  let path = location.hash.replace(/^#/,"") || "/";
  if(!path.startsWith("/")) path = "/";          // ignore stray in-page anchors
  const page = ROUTES[path] || pageHome;
  document.getElementById("app").innerHTML = page();
  document.querySelectorAll(".nav-links a").forEach(a=>{
    a.classList.toggle("active", a.dataset.route===path);
  });
  document.getElementById("navlinks").classList.remove("open");
  window.scrollTo({top:0});
  observeReveal();
  updateMinUI(false);
  if(path==="/portal") refreshAuthState();
  if(window.fbq && render._first) fbq('track','PageView');   // SPA route change
  render._first = true;
}

/* reveal on scroll */
let io;
function observeReveal(){
  if(io) io.disconnect();
  io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
  },{threshold:.12});
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}

/* ---------- interactions (event delegation) ---------- */
document.addEventListener("click", async (e)=>{
  const t=e.target.closest("[data-action]");
  if(t){
    const a=t.dataset.action, id=t.dataset.id;
    if(a==="type"){ state.type=id; document.querySelectorAll(".type-opt").forEach(o=>o.classList.toggle("sel",o.dataset.id===id)); refreshBuilder(); }
    if(a==="room+"){ state.rooms[id]=(state.rooms[id]||0)+1; refreshBuilder(); }
    if(a==="room-"){ state.rooms[id]=Math.max(0,(state.rooms[id]||0)-1); refreshBuilder(); }
    if(a==="upg"){ state.upgrades[id]=!state.upgrades[id]; t.classList.toggle("sel",state.upgrades[id]); refreshBuilder(); }
    if(a==="acc"){ const item=t.closest(".acc-item"); const ans=item.querySelector(".acc-a");
      const open=item.classList.toggle("open"); ans.style.maxHeight=open?ans.scrollHeight+"px":"0"; }
    if(a==="day"){ state.slotDay=id; document.querySelectorAll('[data-action="day"]').forEach(o=>o.classList.toggle("sel",o.dataset.id===id)); }
    if(a==="time"){ state.slotTime=id; document.querySelectorAll('[data-action="time"]').forEach(o=>o.classList.toggle("sel",o.dataset.id===id)); }
    if(a==="scrollto"){ e.preventDefault(); const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); }
    if(a==="to-booking"){ if(!meetsMin(compute())){ e.preventDefault(); updateMinUI(true); scrollToWarn(); }
      else if(window.fbq) fbq('track','InitiateCheckout'); }
    if(a==="start-booking"){ state.bookingStep=1; state.slotDay=null; state.slotTime=null;
      if(window.fbq) fbq('track','InitiateCheckout');
      if(location.hash.replace(/^#/,"")==="/booking"){ e.preventDefault(); render(); } }
    if(a==="bk-next"){
      if(state.bookingStep===1) captureDetails();
      if(state.bookingStep===2 && !meetsMin(compute())){ updateMinUI(true); scrollToWarn(); return; }
      state.bookingStep=Math.min(4,state.bookingStep+1); render();
    }
    if(a==="bk-back"){ state.bookingStep=Math.max(1,state.bookingStep-1); render(); }
    if(a==="confirm-booking"){
      t.disabled=true; t.textContent="Sending…";
      const c=compute(), d=state.details;
      const rooms=ROOMS.filter(r=>state.rooms[r.id]>0).map(r=>`${state.rooms[r.id]}x ${r.name}`).join(", ")||"None";
      const upg=UPGRADES.filter(u=>state.upgrades[u.id]).map(u=>u.name).join(", ")||"None";
      await sendForm({
        subject:"New booking request — NeighbourCare",
        name:d.name, email:d.email, phone:d.phone, address:d.address,
        message:`Cleaning type: ${c.type.name}\nWhen: ${state.slotDay||"-"} ${state.slotTime||""}\nRooms: ${rooms}\nUpgrades: ${upg}\nEstimated total (incl. HST): ${c.type.custom?"Custom quote":money(c.total)}\n\nEmail marketing consent: ${d.emailOptIn?"YES":"No"}\nSMS marketing consent: ${d.smsOptIn?"YES":"No"}`
      });
      if(window.fbq) fbq('track','Schedule',{value:c.type.custom?0:c.total,currency:'CAD'});
      state.bookingStep=5; render();
    }
    if(a==="contact-submit"){
      t.disabled=true;
      const g=id=>(document.getElementById(id)||{}).value||"";
      const ok=await sendForm({subject:"New contact message — NeighbourCare", name:g("cName"), email:g("cEmail"), message:g("cMsg")}, "contactMsg");
      if(ok && window.fbq) fbq('track','Lead');
      t.disabled=false;
    }
    if(a==="auth-oauth"){ oauthSignIn(id); if(window.fbq) fbq('track','Lead',{content_name:'signup_'+id}); }
    if(a==="auth-email"){ emailAuth(id); }
    if(a==="auth-magic"){ magicLink(); }
    if(a==="sign-out"){ signOutUser(); }
    if(a==="fakesubmit"){ e.preventDefault(); t.textContent="✓ Done"; t.style.background="var(--success)"; t.style.color="#fff"; }
    return;
  }
  // mobile menu
  if(e.target.id==="menuToggle"){ document.getElementById("navlinks").classList.toggle("open"); }
});

window.addEventListener("hashchange",render);
if(!location.hash) location.hash="#/";
render();
</script>
